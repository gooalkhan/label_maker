<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Food Labeling SVG Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
<div id="app">
    <header>
        <h1>Food Labeling SVG Generator</h1>
        <div class="actions">
            <button id="load-horizontal-btn">가로형 샘플</button>
            <button id="load-vertical-btn">세로형 샘플</button>
            <button id="save-json-btn">JSON 저장</button>
            <button id="load-json-btn">JSON 불러오기</button>
            <button id="save-btn">Save SVG</button>
        </div>
    </header>
    <main>
        <section id="editor-pane">
            <div id="global-settings">
                <h2>Global Settings</h2>
                <div class="setting-item">
                    <label for="horizontal-scale-slider">장평 (Horizontal Scale): <span id="scale-value">100</span>%</label>
                    <input type="range" id="horizontal-scale-slider" min="90" max="100" step="1" value="100">
                </div>
            </div>
            <h2>Configuration (JSON)</h2>
            <textarea id="json-input" placeholder="Paste your JSON here..."></textarea>
            <div class="editor-actions">
                <button id="apply-btn" class="primary-btn">변경사항 적용하기</button>
            </div>
            <div id="validation-msg"></div>
        </section>
        <section id="preview-pane">
            <div id="overflow-warning" class="warning-bar">
                ⚠️ <strong>Content Overflow:</strong> The text cannot fit within the legal minimum font size (10pt). Please enlarge the label or reduce the content.
            </div>
            <div id="preview-header">
                <h2>Live Preview</h2>
                <div id="zoom-controls">
                    <button id="zoom-out-btn" title="Zoom Out">−</button>
                    <span id="zoom-level">100%</span>
                    <button id="zoom-in-btn" title="Zoom In">+</button>
                    <button id="zoom-reset-btn">Reset</button>
                </div>
            </div>
            <div id="svg-container">
                <!-- SVG will be rendered here -->
            </div>
            <div id="font-size-footer">
                한글표시사항: <span id="main-font-size-val">-</span>pt / 
                영양성분: <span id="nutr-font-size-val">-</span>pt
            </div>
        </section>
    </main>
</div>
<script src="./src/main.js" type="module"></script>
</body>
</html>
